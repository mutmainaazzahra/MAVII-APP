<div class="skeleton-wrapper">
  <div class="skeleton-card" *ngFor="let item of getItems()">

    <div class="skeleton-header">
      <ion-skeleton-text animated style="width: 60%; height: 16px; border-radius: 8px;">
      </ion-skeleton-text>
      <ion-skeleton-text animated style="width: 25%; height: 24px; border-radius: 12px;">
      </ion-skeleton-text>
    </div>

    <ion-skeleton-text animated style="width: 80%; height: 13px; border-radius: 6px; margin-top: 8px;">
    </ion-skeleton-text>

    <ion-skeleton-text animated style="width: 50%; height: 13px; border-radius: 6px; margin-top: 6px;">
    </ion-skeleton-text>

    <div class="skeleton-footer">
      <ion-skeleton-text animated style="width: 35%; height: 13px; border-radius: 6px;">
      </ion-skeleton-text>
      <ion-skeleton-text animated style="width: 20%; height: 13px; border-radius: 6px;">
      </ion-skeleton-text>
    </div>

  </div>
</div>
