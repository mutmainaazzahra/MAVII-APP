<ion-content [fullscreen]="true" class="reset-content">
  <div class="main-container">
    <div class="reset-top">
      <img src="assets/reset-password.png" alt="reset password" class="reset-illustration" />
    </div>

    <div class="reset-card">
      <h2 class="reset-title">Reset Password</h2>
      <p class="reset-subtitle">Masukkan password baru Anda</p>

      <div class="input-group">
        <label class="input-label">New Password</label>
        <div class="input-box">
          <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
          <input [type]="showPassword ? 'text' : 'password'" placeholder="Masukkan password baru" [(ngModel)]="password"
            [disabled]="isLoading" class="native-input" />
          <ion-icon [name]="showPassword ? 'eye-outline' : 'eye-off-outline'" class="input-icon-right"
            (click)="showPassword = !showPassword"></ion-icon>
        </div>
        <p class="error-text" *ngIf="passwordError">{{ passwordError }}</p>
      </div>

      <div class="input-group">
        <label class="input-label">Confirm Password</label>
        <div class="input-box">
          <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
          <input [type]="showConfirmPassword ? 'text' : 'password'" placeholder="Konfirmasi password baru"
            [(ngModel)]="confirmPassword" [disabled]="isLoading" class="native-input" />
          <ion-icon [name]="showConfirmPassword ? 'eye-outline' : 'eye-off-outline'" class="input-icon-right"
            (click)="showConfirmPassword = !showConfirmPassword"></ion-icon>
        </div>
        <p class="error-text" *ngIf="confirmPasswordError">{{ confirmPasswordError }}</p>
      </div>

      <div class="error-banner" *ngIf="errorMessage">
        <ion-icon name="alert-circle-outline"></ion-icon>
        <span>{{ errorMessage }}</span>
      </div>

      <ion-button expand="block" class="btn-reset" [disabled]="isLoading" (click)="onReset()">
        <ion-spinner name="crescent" *ngIf="isLoading" slot="start"></ion-spinner>
        {{ isLoading ? 'Memproses...' : 'Reset Password' }}
      </ion-button>

      <div class="back-link" (click)="goToLogin()">
        <ion-icon name="arrow-back-outline"></ion-icon>
        <span>Back to Login</span>
      </div>
    </div>
  </div>
</ion-content>
