<ion-content [fullscreen]="true" class="forgot-content">
  <div class="forgot-top">
    <img src="assets/forgotpassword.png" alt="forgot password" class="forgot-illustration"/>
  </div>

  <div class="forgot-card">
    <h2 class="forgot-title">Forgot Password</h2>
    <p class="forgot-subtitle">Enter your email and we'll send you a link to reset your password</p>

    <div class="input-group">
      <label class="input-label">Enter Your Email</label>
      <div class="input-box">
        <ion-icon name="mail-outline" class="input-icon"></ion-icon>
        <input type="email" placeholder="Masukkan email" [(ngModel)]="email" [disabled]="isLoading" class="native-input"/>
      </div>
      <p class="error-text" *ngIf="emailError">{{ emailError }}</p>
    </div>

    <div class="error-banner" *ngIf="errorMessage">
      <ion-icon name="alert-circle-outline"></ion-icon>
      <span>{{ errorMessage }}</span>
    </div>

    <ion-button expand="block" class="btn-submit" [disabled]="isLoading" (click)="onSubmit()">
      <ion-spinner name="crescent" *ngIf="isLoading" slot="start"></ion-spinner>
      {{ isLoading ? 'Mengirim...' : 'Submit' }}
    </ion-button>

    <div class="back-link" (click)="goToLogin()">
      <ion-icon name="arrow-back-outline"></ion-icon>
      <span>Back to Login</span>
    </div>
  </div>
</ion-content>
